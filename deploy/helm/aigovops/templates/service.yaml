apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gate
  labels: { app: aigovops-gate }
spec:
  type: {{ .Values.service.type }}
  selector: { app: aigovops-gate }
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
