# Defaults for the AiGovOps gate service.
replicaCount: 2

image:
  repository: ghcr.io/bobrapp/aigovops
  tag: "4.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8930

# Run the unified gate under the gVisor sandbox runtime (see @aigovops/sandbox).
runtimeClassName: gvisor

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 250m, memory: 256Mi }

# The tier (1–6) the install/onboarding flow detects; selects local vs heavyweight adapters.
tier: 4
